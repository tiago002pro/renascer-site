<nav [class.scrolled]="isScrolled">
  <div class="logo">
    <img src="assets/images/logo.png" alt="Logo">
  </div>

  <ul class="menu">
    @for (item of menu; track $index) {
      <li>
        <a
          routerLink="/"
          fragment="{{item.fragment}}"
          [class.active]="(activeSection$ | async) === item.fragment"
        >
          {{ item.label }}
        </a>
      </li>
    }
  </ul>
</nav>
